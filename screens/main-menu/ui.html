<div class="loading-menu-bg">
    <div class="menu-top-right-nav">
        <button id="btn-backpack" class="btn-mini-menu" onclick="changeScreen('garden')"></button>
        <button id="btn-setting" class="btn-mini-menu" onclick="console.log('Open Setting')"></button>
    </div>

    <div class="menu-content-core">
        <img src="assets/Game_Logo.png" alt="Mon English Logo" class="game-logo-main">
        
        <div id="menu-controls" class="menu-buttons-side">
            <button id="btn-start" class="btn-main" onclick="changeScreen('battle')"></button>
            <button id="btn-collection-menu" class="btn-main" onclick="changeScreen('collection')"></button>
        </div>
    </div>

    <div class="menu-right-char-zone">
        <div id="menu-avatar-display" class="menu-char-preview animation-idle"></div>
        <div class="player-nametag-wrapper">
            <img id="main-menu-avatar" src="" class="avatar-brawl-style" alt="Avatar">
            <span id="player-name-text">Username</span>
        </div>
    </div>

    <div id="login-popup" class="modal-overlay">
        <div class="login-popup-content">
            <h3>MON ENGLISH - USER LOGIN</h3>
            
            <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 25px 0;">
                <div class="input-center-zone">
                    <input type="text" id="login-input-username" placeholder="Enter Username..." maxlength="15" style="width: 260px;">
                </div>
                <div class="input-center-zone">
                    <input type="password" id="login-input-password" placeholder="Enter Password..." maxlength="15" style="width: 260px; border-color: #ca8a04;">
                </div>
            </div>

            <button class="btn-confirm-login" onclick="handleAccountAuthentication()">LOGIN</button>
        </div>
    </div>
</div>
