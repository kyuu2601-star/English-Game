<div class="battle-screen-layout">
    <div id="battle-field"></div>

    <div id="shiny-particles" class="shiny-container"></div>

    <div id="player-sprite"></div>

    <div class="mob-node-box">
        <div id="mob-sprite"></div>
        <div id="mob-nametag">
            <span id="mob-name-text">Mob Name</span>
        </div>
    </div>

    <div id="ball-vfx"></div>
    <div id="smoke-vfx"></div>

    <div class="battle-dialogue-ui">
        <div id="question-text" class="question-zone">Loading Question...</div>
        
        <div class="answers-zone">
            <button id="ans-A" class="btn-answer" onclick="submitAnswer('A')">Option A</button>
            <button id="ans-B" class="btn-answer" onclick="submitAnswer('B')">Option B</button>
            <button id="ans-C" class="btn-answer" onclick="submitAnswer('C')">Option C</button>
        </div>
    </div>

    <div class="top-nav-bar-right">
            <button id="btn-back-to-menu" class="btn-mini" onclick="changeScreen('menu')"></button>
            <button id="btn-collection-book" class="btn-mini" onclick="changeScreen('collection')"></button>
            <button id="btn-backpack" class="btn-mini" onclick="console.log('Open Backpack In Battle')"></button>
            <button id="btn-setting" class="btn-mini" onclick="console.log('Open Setting In Battle')"></button>
    </div>

    <div class="coin-display-wrapper">
        <div class="coin-display">
            🪙 <span id="user-coins">0</span>
        </div>
    </div>

    <div id="result-popup-banner" class="result-popup-banner"></div>
</div>
