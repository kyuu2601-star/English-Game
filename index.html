<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon English - Version 7</title>
    <link rel="stylesheet" href="global.css">
    <link rel="manifest" href="./manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('🚀 [PWA] Service Worker Registered!', reg.scope))
                    .catch(err => console.error('❌ [PWA] Service Worker Register Failed!', err));
            });
        }
    </script>
</head>
<body>

    <div class="game-window">
        <div id="game-viewport"></div>
    </div>

    <div class="rotate-device-overlay">
        <p>Please rotate your device to landscape mode to play!</p>
    </div>

    <script src="core-engine.js?v=7"></script>
</body>
</html>
