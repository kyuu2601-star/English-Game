<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon English - Version 8</title>
    <link rel="stylesheet" href="global.css">
    <link rel="manifest" href="./manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('🚀 [PWA] Service Worker Registered!', reg.scope))
                    .catch(err => console.error('❌ [PWA] Service Worker Register Failed!', err));
            });
        }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mon English">
    <link rel="apple-touch-icon" href="assets/Favicon.ico">
</head>
<body>

    <div class="game-window">
        <div id="game-viewport"></div>
    </div>

    <div class="rotate-device-overlay">
        <p>Please rotate your device to landscape mode to play!</p>
    </div>

    <div id="global-logout-popup" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 999999; justify-content: center; align-items: center;">
    <div style="background-color: #fff; width: 85%; max-width: 450px; padding: 4vh; border-radius: 20px; border: 4px solid #facc15; text-align: center; position: relative;">
        
        <h2 style="font-family: 'MyFredoka', sans-serif; font-size: 4vh; color: #b45309; margin-bottom: 2vh;">ĐĂNG XUẤT?</h2>
        <p style="font-family: 'MyFredoka', sans-serif; font-size: 2.5vh; color: #334155; margin-bottom: 3vh;">Bạn có chắc chắn muốn thoát tài khoản không?</p>
        
        <div style="display: flex; justify-content: center; gap: 3vw;">
            <button class="btn-popup-action btn-popup-cancel" onclick="closeLogoutPopup()">Cancel</button>
            
            <button class="btn-popup-action btn-popup-confirm" onclick="executeLogout()">Confirm</button>
        </div>

    </div>
</div>
    
    <script src="core-engine.js?v=9"></script>
</body>
</html>
